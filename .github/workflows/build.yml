name: Build & Release

on:
  push:
    branches: [main]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [main]

permissions:
  contents: write

# ─────────────────────────────────────────────────────────────────────────────
# SECRETOS NECESARIOS EN GITHUB → Settings → Secrets and variables → Actions
#
# macOS (ya configurado):
#   (ninguno adicional — firma desactivada, Gatekeeper bypass manual)
#
# Android (nuevo):
#   ANDROID_KEYSTORE_BASE64   — keystore .jks en base64 (openssl base64 -in key.jks)
#   ANDROID_KEY_ALIAS         — alias de la clave dentro del keystore
#   ANDROID_KEY_PASSWORD       — contraseña de la clave
#   ANDROID_STORE_PASSWORD     — contraseña del keystore
#
# iOS (nuevo):
#   APPLE_CERTIFICATE          — certificado .p12 de distribución en base64
#   APPLE_CERTIFICATE_PASSWORD — contraseña del .p12
#   APPLE_PROVISIONING_PROFILE — perfil .mobileprovision en base64 (ad-hoc)
#   APPLE_TEAM_ID              — Team ID de Apple Developer (ej. ABC123XYZ)
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # macOS — Widget barra de menús, build universal (arm64 + x86_64)
  # ═══════════════════════════════════════════════════════════════════════════
  build-macos:
    name: Build macOS (universal)
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install JS dependencies
        run: npm ci

      - name: Create .env
        run: echo "VITE_API_BASE_URL=https://vacaciones.smartcity.link" > .env

      # ── Build + Release en tags ─────────────────────────────────────────────
      - name: Build & publish release (macOS)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Link Fichajes ${{ github.ref_name }}
          releaseBody: |
            ## Link Fichajes ${{ github.ref_name }}

            App nativa para fichar entrada/salida desde cualquier dispositivo.

            ### macOS (barra de menús)
            1. Descarga `LinkFichajes.dmg` y ábrelo
            2. Arrastra **Link Fichajes** a Aplicaciones
            3. Primera vez: clic derecho → **Abrir** (Gatekeeper)
            4. Haz clic en el icono de la barra de menú e inicia sesión

            ### Android (APK)
            1. Descarga `LinkFichajes.apk` en tu dispositivo Android
            2. Ajustes → Instalar apps desconocidas → actívalo para tu navegador
            3. Abre el APK e instala la app

            ### iOS (TestFlight)
            - Disponible próximamente vía TestFlight

            ### Requisitos
            - macOS 13 Ventura o superior / Android 8.0+ / iOS 16+
            - Cuenta `@smartcity.link`
          args: --target universal-apple-darwin
          releaseDraft: false
          prerelease: false

      # Renombrar el asset a LinkFichajes.dmg para URL fija en la web
      - name: Rename macOS release asset to LinkFichajes.dmg
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          REPO="${{ github.repository }}"

          ASSET_ID=$(curl -s \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/releases/tags/$TAG" \
            | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          for a in data.get('assets', []):
            if a['name'].endswith('.dmg'):
              print(a['id'])
              break
          ")

          if [ -z "$ASSET_ID" ]; then
            echo "No DMG asset found in release $TAG"
            exit 1
          fi

          echo "Renaming asset $ASSET_ID to LinkFichajes.dmg"
          curl -s -X PATCH \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/$REPO/releases/assets/$ASSET_ID" \
            -d '{"name":"LinkFichajes.dmg"}' \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print('Renamed to:', d.get('name', 'error'))"

      # ── Build sin release en push a main / PRs ────────────────────────────
      - name: Build only (no release)
        if: "!startsWith(github.ref, 'refs/tags/v')"
        run: npm run tauri build -- --target universal-apple-darwin

      - name: Upload DMG artifact
        if: "!startsWith(github.ref, 'refs/tags/v')"
        uses: actions/upload-artifact@v4
        with:
          name: LinkFichajes-macos-${{ github.sha }}
          path: src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
          retention-days: 7

  # ═══════════════════════════════════════════════════════════════════════════
  # Android — APK firmado (requiere secrets ANDROID_*)
  # ═══════════════════════════════════════════════════════════════════════════
  build-android:
    name: Build Android (APK)
    runs-on: ubuntu-latest
    # Saltar si no hay secrets de firma configurados (fork / PR externo)
    if: >
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK r27
        run: |
          sdkmanager --install "ndk;27.0.11902837"
          echo "NDK_HOME=$ANDROID_HOME/ndk/27.0.11902837" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.0.11902837" >> $GITHUB_ENV

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: >-
            aarch64-linux-android,
            armv7-linux-androideabi,
            i686-linux-android,
            x86_64-linux-android

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install JS dependencies
        run: npm ci

      - name: Create .env
        run: echo "VITE_API_BASE_URL=https://vacaciones.smartcity.link" > .env

      # Descifrar el keystore desde el secret
      - name: Decode Android keystore
        if: env.ANDROID_KEYSTORE_BASE64 != ''
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > src-tauri/gen/android/app/linkfichajes.jks

      # Escribir las propiedades de firma para Gradle
      - name: Write signing config
        if: env.ANDROID_KEY_ALIAS != ''
        env:
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
        run: |
          cat > src-tauri/gen/android/app/tauri.properties <<EOF
          KEYSTORE_PATH=linkfichajes.jks
          KEY_ALIAS=$ANDROID_KEY_ALIAS
          KEY_PASSWORD=$ANDROID_KEY_PASSWORD
          STORE_PASSWORD=$ANDROID_STORE_PASSWORD
          EOF

      - name: Build Android APK
        run: npm run tauri android build -- --apk

      - name: Rename APK
        run: |
          APK=$(find src-tauri/gen/android -name "*.apk" | grep -v "unsigned" | head -1)
          if [ -z "$APK" ]; then
            APK=$(find src-tauri/gen/android -name "*.apk" | head -1)
          fi
          echo "Found APK: $APK"
          mkdir -p dist-android
          cp "$APK" dist-android/LinkFichajes.apk

      # ── Subir APK al release en tags ──────────────────────────────────────
      - name: Upload APK to release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          REPO="${{ github.repository }}"

          # Esperar a que el release exista (lo crea el job macOS)
          for i in $(seq 1 12); do
            RELEASE_ID=$(curl -s \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/$REPO/releases/tags/$TAG" \
              | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('id',''))" 2>/dev/null)
            [ -n "$RELEASE_ID" ] && break
            echo "Release no encontrado, reintentando ($i/12)..."
            sleep 10
          done

          if [ -z "$RELEASE_ID" ]; then
            echo "No se encontró el release $TAG tras esperar. Subiendo como artefacto."
            exit 0
          fi

          echo "Subiendo LinkFichajes.apk al release $RELEASE_ID"
          curl -s \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/vnd.android.package-archive" \
            --data-binary @dist-android/LinkFichajes.apk \
            "https://uploads.github.com/repos/$REPO/releases/$RELEASE_ID/assets?name=LinkFichajes.apk"

      # ── Artefacto en push a main / PRs ────────────────────────────────────
      - name: Upload APK artifact
        if: "!startsWith(github.ref, 'refs/tags/v')"
        uses: actions/upload-artifact@v4
        with:
          name: LinkFichajes-android-${{ github.sha }}
          path: dist-android/LinkFichajes.apk
          retention-days: 14

  # ═══════════════════════════════════════════════════════════════════════════
  # iOS — .ipa firmado ad-hoc (requiere secrets APPLE_*)
  # Prerequisito: Apple Developer Account ($99/año) + provisioning profile
  # ═══════════════════════════════════════════════════════════════════════════
  build-ios:
    name: Build iOS (.ipa)
    runs-on: macos-14
    # Solo en tags o push a main (no en PRs — requiere certificados)
    if: >
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install CocoaPods
        run: gem install cocoapods --no-document

      - name: Install JS dependencies
        run: npm ci

      - name: Create .env
        run: echo "VITE_API_BASE_URL=https://vacaciones.smartcity.link" > .env

      # Instalar certificado de distribución
      - name: Import Apple certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          security create-keychain -p "github-actions" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "github-actions" "$KEYCHAIN_PATH"
          echo "$APPLE_CERTIFICATE" | base64 --decode > /tmp/certificate.p12
          security import /tmp/certificate.p12 -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

      # Instalar perfil de aprovisionamiento (ad-hoc)
      - name: Install provisioning profile
        env:
          APPLE_PROVISIONING_PROFILE: ${{ secrets.APPLE_PROVISIONING_PROFILE }}
        run: |
          PP_PATH="$RUNNER_TEMP/LinkFichajes.mobileprovision"
          echo "$APPLE_PROVISIONING_PROFILE" | base64 --decode > "$PP_PATH"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Install iOS Pods
        run: |
          cd src-tauri/gen/apple
          pod install --repo-update

      - name: Build iOS app
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          npm run tauri ios build -- \
            --target aarch64-apple-ios \
            --export-method ad-hoc

      - name: Find and rename IPA
        run: |
          IPA=$(find src-tauri/gen/apple/build -name "*.ipa" | head -1)
          echo "Found IPA: $IPA"
          mkdir -p dist-ios
          cp "$IPA" dist-ios/LinkFichajes.ipa

      # ── Subir IPA al release en tags ──────────────────────────────────────
      - name: Upload IPA to release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          REPO="${{ github.repository }}"

          for i in $(seq 1 12); do
            RELEASE_ID=$(curl -s \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/$REPO/releases/tags/$TAG" \
              | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('id',''))" 2>/dev/null)
            [ -n "$RELEASE_ID" ] && break
            echo "Release no encontrado, reintentando ($i/12)..."
            sleep 10
          done

          if [ -z "$RELEASE_ID" ]; then
            echo "No se encontró el release. Artefacto disponible en la acción."
            exit 0
          fi

          echo "Subiendo LinkFichajes.ipa al release $RELEASE_ID"
          curl -s \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @dist-ios/LinkFichajes.ipa \
            "https://uploads.github.com/repos/$REPO/releases/$RELEASE_ID/assets?name=LinkFichajes.ipa"

      # ── Artefacto en push a main ───────────────────────────────────────────
      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: LinkFichajes-ios-${{ github.sha }}
          path: dist-ios/LinkFichajes.ipa
          retention-days: 14
